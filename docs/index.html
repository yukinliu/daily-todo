<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>每日任务表</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3dfbd;
      --panel: #fffaf0;
      --text: #352318;
      --muted: #8a684f;
      --line: #e3c89b;
      --red-bg: #fff0e8;
      --red-line: #b6402a;
      --red-text: #8d2d20;
      --green-bg: #eef4df;
      --green-line: #4f8a69;
      --green-text: #2e684e;
      --accent: #b44b2b;
      --accent-soft: #f7ddc5;
      --gold-soft: #fff2c8;
      --gold: #9f6718;
      --teal: #2f7f78;
      --teal-soft: #dceee5;
      --shadow: 0 14px 34px rgba(83, 48, 22, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 0%, rgba(180, 75, 43, 0.11), transparent 30%),
        linear-gradient(180deg, #fff4dc, var(--bg));
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 40px;
    }

    .topbar,
    .ddl-strip,
    .status-panel,
    .todo-panel,
    .calendar-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(2px);
    }

    .topbar {
      display: grid;
      grid-template-columns: auto minmax(260px, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      margin-bottom: 12px;
    }

    .segmented {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(84px, 1fr));
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7e9cf;
    }

    .segmented button,
    .ghost,
    .primary,
    .icon-button {
      min-height: 40px;
      border: 0;
      border-radius: 7px;
      transition: transform 140ms ease, background 140ms ease, color 140ms ease;
    }

    .segmented button {
      padding: 0 14px;
      color: var(--muted);
      background: transparent;
      outline: none;
    }

    .segmented button.active {
      color: var(--accent);
      background: #fff7e8;
      box-shadow: inset 0 0 0 1px rgba(180, 75, 43, 0.18), 0 1px 5px rgba(83, 48, 22, 0.1);
    }

    .segmented button:focus-visible,
    .ghost:focus-visible,
    .primary:focus-visible,
    .icon-button:focus-visible,
    .add-todo:focus-visible,
    .metric-button:focus-visible {
      outline: 2px solid rgba(180, 75, 43, 0.28);
      outline-offset: 2px;
    }

    .range-control {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .range-control span {
      color: var(--muted);
      font-size: 13px;
    }

    input,
    select,
    textarea {
      min-height: 40px;
      padding: 9px 11px;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fffdf7;
      outline: none;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(180, 75, 43, 0.16);
    }

    .ghost,
    .icon-button {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .ghost {
      padding: 0 13px;
    }

    .primary {
      padding: 0 16px;
      color: #fff;
      background: var(--accent);
      font-weight: 720;
    }

    .segmented button:hover,
    .ghost:hover,
    .primary:hover,
    .icon-button:hover {
      transform: translateY(-1px);
    }

    .ddl-strip {
      display: grid;
      gap: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 720;
    }

    .project-rail {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(190px, calc((100% - 36px) / 4));
      gap: 12px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      padding-bottom: 2px;
      scroll-snap-type: x proximity;
    }

    .project-card {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 126px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff7e8;
      scroll-snap-align: start;
    }

    .project-card.has-ddl {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255, 242, 200, 0.96), rgba(255, 250, 240, 0.9)),
        var(--gold-soft);
      border-color: #d9aa4e;
    }

    .project-card.due-soon {
      background:
        linear-gradient(135deg, rgba(255, 232, 213, 0.98), rgba(255, 247, 232, 0.92)),
        #fff0e8;
      border-color: #cf7042;
    }

    .project-card.due-later {
      background:
        linear-gradient(135deg, rgba(255, 245, 216, 0.96), rgba(255, 250, 240, 0.9)),
        var(--gold-soft);
      border-color: #d9aa4e;
    }

    .project-card.has-ddl::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: linear-gradient(180deg, var(--accent), var(--gold));
    }

    .project-card.due-later::before {
      background: linear-gradient(180deg, var(--gold), #d9aa4e);
    }

    .project-card.add-card {
      place-items: center;
      color: var(--teal);
      background: var(--teal-soft);
      border: 1px dashed rgba(47, 127, 120, 0.45);
      font-weight: 760;
    }

    .project-card.other-card {
      color: rgba(122, 97, 72, 0.78);
      background: rgba(242, 234, 219, 0.55);
      border-color: rgba(138, 104, 79, 0.22);
    }

    .other-count {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 720;
    }

    .project-content {
      display: grid;
      gap: 12px;
      min-width: 0;
      padding-left: 2px;
    }

    .project-name {
      min-width: 0;
      font-size: 17px;
      font-weight: 780;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-countdown {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
    }

    .project-date-placeholder {
      width: fit-content;
      color: rgba(122, 97, 72, 0.76);
      border-bottom: 1px dashed rgba(138, 104, 79, 0.38);
      font-size: 13px;
      font-weight: 720;
    }

    .schedule-editor {
      display: grid;
      grid-template-columns: minmax(104px, auto) minmax(138px, 1fr);
      gap: 8px;
      align-items: center;
    }

    .days-left {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      min-width: 92px;
      min-height: 68px;
      padding: 8px 14px;
      color: #fffaf0;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #d48737);
      box-shadow: 0 12px 22px rgba(180, 75, 43, 0.2);
      font-size: 36px;
      font-weight: 840;
      line-height: 1;
    }

    .days-left.long-range {
      align-items: center;
      font-size: 24px;
      letter-spacing: 0;
    }

    .days-left small {
      margin-left: 3px;
      font-size: 15px;
      font-weight: 720;
    }

    .project-card.due-later .days-left {
      color: #5f401f;
      background: linear-gradient(135deg, #f3cf83, #e6b85d);
      box-shadow: 0 8px 18px rgba(159, 103, 24, 0.14);
    }

    .project-card.waiting-project {
      background:
        linear-gradient(135deg, rgba(255, 250, 240, 0.96), rgba(255, 246, 226, 0.9)),
        #fff8e8;
      border-color: rgba(185, 126, 31, 0.42);
    }

    .project-card.waiting-project::before {
      background: linear-gradient(180deg, #b97e1f, #e1b960);
    }

    .project-card.due-soon .days-left {
      background: linear-gradient(135deg, #b6402a, #d36a32);
    }

    .countdown-text {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
    }

    .project-ddl {
      color: var(--gold);
      font-size: 13px;
      font-weight: 720;
    }

    .project-card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 8px;
    }

    .project-card-actions .icon-button {
      width: 34px;
      min-width: 34px;
      min-height: 34px;
      color: var(--accent);
      background: rgba(247, 221, 197, 0.78);
    }

    .project-list {
      display: grid;
      gap: 8px;
      max-height: 420px;
      overflow: auto;
    }

    .project-list-group {
      display: grid;
      gap: 8px;
    }

    .project-list-group + .project-list-group {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(227, 200, 155, 0.45);
    }

    .project-list-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      font-weight: 780;
    }

    .project-list-heading strong {
      color: var(--ink);
      font-size: 15px;
    }

    .project-list-item {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) 150px auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff7e8;
    }

    .main-content {
      display: grid;
      gap: 12px;
    }

    .status-panel {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
    }

    .metric {
      min-height: 78px;
      padding: 13px 14px;
      background: #fffdf7;
    }

    .metric span {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .metric strong {
      font-size: 30px;
      line-height: 1;
    }

    .metric-button {
      width: 100%;
      min-height: 78px;
      padding: 13px 14px;
      color: inherit;
      text-align: left;
      border: 0;
      background: #fffdf7;
    }

    .metric-button span {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 720;
    }

    .metric-button strong {
      font-size: 30px;
      line-height: 1;
    }

    .todo-panel {
      overflow: hidden;
    }

    .todo-tools {
      display: flex;
      justify-content: flex-end;
      padding: 10px 14px 0;
      background: #fffdf7;
    }

    .inline-input,
    .inline-select,
    .inline-date,
    .inline-time {
      width: 100%;
      min-width: 0;
      min-height: 34px;
      padding: 6px 8px;
      color: inherit;
      border-color: rgba(227, 200, 155, 0.65);
      background: rgba(255, 253, 247, 0.72);
      font-weight: 720;
    }

    .inline-input {
      font-size: 16px;
    }

    .inline-field-wrap {
      min-width: 140px;
    }

    [data-task-field],
    [data-project-field] {
      cursor: text;
    }

    [data-task-field="projectId"],
    [data-task-field="plannedStart"],
    [data-task-field="targetDate"],
    [data-project-field="ddl"] {
      cursor: pointer;
    }

    table {
      width: 100%;
      min-width: 1180px;
      table-layout: fixed;
      border-collapse: collapse;
    }

    th:nth-child(1),
    td:nth-child(1) { width: 50px; }

    th:nth-child(2),
    td:nth-child(2) { width: 220px; }

    th:nth-child(3),
    td:nth-child(3) { width: 150px; }

    th:nth-child(4),
    td:nth-child(4) { width: 118px; }

    th:nth-child(5),
    td:nth-child(5) { width: 128px; }

    th:nth-child(6),
    td:nth-child(6) { width: 110px; }

    th:nth-child(7),
    td:nth-child(7) { width: 300px; }

    th:nth-child(8),
    td:nth-child(8) { width: 104px; }

    th,
    td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      background: #fafbf9;
      font-size: 13px;
      font-weight: 720;
    }

    .add-row td {
      padding: 10px 14px;
      background: #fffdf7;
    }

    .time-section-row td {
      padding: 7px 14px 5px;
      color: rgba(138, 104, 79, 0.72);
      background: linear-gradient(90deg, rgba(227, 200, 155, 0.28), transparent 58%);
      border-bottom: 1px solid rgba(227, 200, 155, 0.42);
      font-size: 13px;
      font-weight: 720;
    }

    .planned-time {
      color: var(--muted);
      font-weight: 720;
      white-space: nowrap;
    }

    .planned-time.empty-time {
      opacity: 0.58;
      font-weight: 620;
    }

    .add-todo {
      width: 100%;
      min-height: 38px;
      color: var(--teal);
      border: 1px dashed rgba(47, 127, 120, 0.45);
      border-radius: 7px;
      background: var(--teal-soft);
      font-size: 24px;
      font-weight: 780;
      line-height: 1;
    }

    .task-row.pending {
      color: var(--red-text);
      background: var(--red-bg);
    }

    .task-row.pending td:first-child {
      border-left: 4px solid var(--red-line);
    }

    .task-row.done {
      color: var(--green-text);
      background: var(--green-bg);
    }

    .task-row.done td:first-child {
      border-left: 4px solid var(--green-line);
    }

    .task-row.dragging {
      opacity: 0.5;
    }

    .drag-handle {
      color: var(--muted);
      font-size: 18px;
      user-select: none;
    }

    .task-title {
      width: 100%;
      min-width: 0;
      font-weight: 720;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-note {
      display: none;
    }

    .completion-record {
      display: block;
      width: 100%;
      overflow: visible;
      white-space: nowrap;
    }

    .chip,
    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      max-width: 220px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid currentColor;
      background: rgba(255, 250, 240, 0.72);
      font-size: 13px;
      font-weight: 720;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ddl-small {
      margin-top: 6px;
      color: var(--gold);
      font-size: 13px;
      font-weight: 720;
    }

    .empty {
      padding: 38px 16px;
      color: var(--muted);
      text-align: center;
      background: #fffdf7;
    }

    .actions {
      display: flex;
      gap: 7px;
      justify-content: flex-start;
      min-width: 0;
      width: 82px;
    }

    .icon-button {
      width: 34px;
      min-width: 34px;
      min-height: 34px;
      padding: 0;
      font-size: 15px;
      line-height: 1;
    }

    .action-complete {
      width: 34px;
      min-width: 34px;
      min-height: 34px;
      color: #fffaf0;
      background: var(--accent);
      box-shadow: 0 6px 12px rgba(180, 75, 43, 0.12);
    }

    .action-secondary,
    .action-danger {
      width: 30px;
      min-width: 30px;
      min-height: 30px;
      color: rgba(180, 75, 43, 0.58);
      background: rgba(247, 221, 197, 0.42);
      box-shadow: none;
      font-size: 14px;
    }

    .action-secondary:hover,
    .action-danger:hover {
      background: rgba(247, 221, 197, 0.75);
    }

    .hover-tooltip {
      position: fixed;
      z-index: 9999;
      max-width: min(420px, calc(100vw - 32px));
      padding: 9px 11px;
      color: #fffaf0;
      background: rgba(57, 36, 26, 0.94);
      border: 1px solid rgba(255, 245, 226, 0.18);
      border-radius: 8px;
      box-shadow: 0 12px 26px rgba(57, 36, 26, 0.22);
      font-size: 13px;
      font-weight: 650;
      line-height: 1.45;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .hover-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hidden-note {
      color: var(--muted);
      font-size: 13px;
    }

    .calendar-panel {
      padding: 12px;
    }

    .calendar-grid {
      display: grid;
      gap: 16px;
    }

    .month-section {
      display: grid;
      gap: 8px;
    }

    .month-title {
      color: var(--text);
      font-size: 20px;
      font-weight: 780;
    }

    .weekday-row,
    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekday-row span {
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      font-weight: 720;
    }

    .day-card {
      min-height: 142px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff7e8;
    }

    .day-card.outside-range {
      visibility: hidden;
    }

    .day-card.today {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .day-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      font-weight: 760;
    }

    .day-count {
      color: var(--muted);
      font-size: 13px;
      font-weight: 680;
    }

    .calendar-projects {
      display: grid;
      gap: 6px;
    }

    .calendar-project {
      display: grid;
      gap: 3px;
      padding: 8px;
      border-radius: 7px;
      background: #fffdf7;
      border: 1px solid var(--line);
    }

    .calendar-project.unassigned {
      background: rgba(242, 234, 219, 0.45);
      border-color: rgba(138, 104, 79, 0.22);
      color: rgba(122, 97, 72, 0.72);
      opacity: 0.72;
    }

    .calendar-project.unassigned strong {
      font-weight: 620;
    }

    .calendar-project strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .calendar-project span {
      color: var(--muted);
      font-size: 12px;
    }

    dialog {
      width: min(700px, calc(100vw - 28px));
      max-height: min(760px, calc(100vh - 28px));
      padding: 0;
      border: 0;
      border-radius: 8px;
      box-shadow: 0 24px 70px rgba(31, 39, 45, 0.24);
      overflow: hidden;
    }

    dialog::backdrop {
      background: rgba(65, 39, 23, 0.38);
    }

    #completeDialog {
      width: min(620px, calc(100vw - 28px));
    }

    #timePieDialog {
      width: min(820px, calc(100vw - 28px));
    }


    .dialog-body {
      display: grid;
      gap: 12px;
      padding: 18px;
      background: #fffdf7;
    }

    .dialog-body h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .dialog-body p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .dialog-grid {
      display: grid;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
    }

    .dialog-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .review-task {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff7e8;
    }

    .review-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .time-input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(180px, 240px);
      gap: 12px;
      align-items: end;
    }

    .minute-with-unit {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .minute-with-unit input {
      width: 100%;
      min-width: 0;
    }

    .minute-unit {
      color: var(--muted);
      font-weight: 720;
      white-space: nowrap;
    }

    .rating-options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      border: 0;
      padding: 0;
      margin: 0;
    }

    .rating-options legend {
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
    }

    .rating-options label {
      display: grid;
      place-items: center;
      min-height: 42px;
      padding: 0 10px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fffdf7;
      font-weight: 720;
      cursor: pointer;
    }

    .rating-options input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .rating-options label:has(input:checked) {
      color: var(--accent);
      border-color: rgba(180, 75, 43, 0.42);
      background: #fff0e8;
      box-shadow: inset 0 0 0 1px rgba(180, 75, 43, 0.1);
    }

    .pie-layout {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 22px;
      align-items: center;
    }

    .pie-wrap {
      position: relative;
      width: 240px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .pie-chart {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--pie, #f2eadb);
      box-shadow: 0 16px 32px rgba(83, 48, 22, 0.14);
    }

    .pie-center {
      position: relative;
      display: grid;
      place-items: center;
      width: 118px;
      height: 118px;
      padding: 10px;
      text-align: center;
      border-radius: 50%;
      background: #fffaf0;
      box-shadow: inset 0 0 0 1px rgba(227, 200, 155, 0.9);
    }

    .pie-center span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
    }

    .pie-center strong {
      font-size: 20px;
      line-height: 1.12;
    }

    .pie-legend {
      display: grid;
      gap: 8px;
    }

    .legend-item {
      display: grid;
      grid-template-columns: 14px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      color: var(--text);
      font-size: 14px;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 4px;
    }

    @media (max-width: 720px) {
      .pie-layout,
      .time-input-row {
        grid-template-columns: 1fr;
      }

      .pie-wrap {
        width: min(240px, 72vw);
        justify-self: center;
      }
    }

    .is-hidden {
      display: none;
    }

    @media (max-width: 820px) {
      .app {
        width: min(100vw - 18px, 1180px);
        padding-top: 14px;
      }

      .topbar,
      .status-panel {
        grid-template-columns: 1fr;
      }

      .range-control {
        justify-content: start;
      }

      .range-control input {
        flex: 1;
        min-width: 150px;
      }

      .project-rail {
        grid-auto-columns: minmax(190px, 84vw);
      }

      .project-list-item {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="日期控制">
      <div class="segmented" role="tablist" aria-label="快速切换日期">
        <button type="button" id="todayBtn">今天</button>
        <button type="button" id="tomorrowBtn">明天</button>
      </div>

      <div class="range-control">
        <input type="date" id="rangeStart" aria-label="开始日期">
        <span>至</span>
        <input type="date" id="rangeEnd" aria-label="结束日期">
        <button type="button" class="ghost" id="clearRangeBtn">单日</button>
      </div>

      <button type="button" class="ghost" id="showAllBtn">全部记录</button>
    </section>

    <section class="ddl-strip" aria-label="DDL 项目">
      <div class="section-title">
        <span>DDL 项目</span>
        <span>
          <button class="ghost" type="button" id="manageProjectsBtn">管理全部项目</button>
          <span id="projectHint"></span>
        </span>
      </div>
      <div class="project-rail" id="projectRail"></div>
    </section>

    <section class="main-content" id="dailyView">
      <section class="status-panel" aria-label="Todo 完成情况">
        <div class="metric">
          <span>当前显示</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="metric">
          <span>未完成</span>
          <strong id="pendingCount">0</strong>
        </div>
        <div class="metric">
          <span>已完成</span>
          <strong id="doneCount">0</strong>
        </div>
        <div class="metric">
          <span>完成率</span>
          <strong id="doneRate">0%</strong>
        </div>
        <button class="metric-button" type="button" id="focusTimeBtn">
          <span>专注时间</span>
          <strong id="focusTime">0分钟</strong>
        </button>
      </section>

      <section class="todo-panel" aria-label="Todo 清单">
        <div class="todo-tools">
          <button class="ghost" type="button" id="resetSortBtn">恢复默认排序</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>排序</th>
              <th>Todo</th>
              <th>项目</th>
              <th>计划开始</th>
              <th>日期</th>
              <th>状态</th>
              <th>完成记录</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="taskBody"></tbody>
        </table>
        <div id="emptyState" class="empty" hidden>这一天还没有 todo。</div>
      </section>

      <p class="hidden-note" id="hiddenNote"></p>
    </section>

    <section class="calendar-panel is-hidden" id="calendarView" aria-label="日历视图">
      <div class="section-title">
        <span id="calendarTitle">日历视图</span>
        <span>按日期查看主要项目</span>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </section>
  </main>

  <div class="hover-tooltip" id="hoverTooltip" hidden></div>

  <dialog id="projectDialog">
    <form class="dialog-body" id="projectForm" method="dialog">
      <h2 id="projectDialogTitle">添加项目</h2>
      <div class="dialog-grid">
        <input id="projectName" type="text" placeholder="项目名称">
        <div class="field">
          <label for="projectDdl">项目 DDL</label>
          <input type="date" id="projectDdl">
        </div>
      </div>
      <div class="dialog-actions">
        <button class="ghost" type="button" id="projectCancelBtn">取消</button>
        <button class="primary" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="taskDialog">
    <form class="dialog-body" id="taskForm" method="dialog">
      <h2 id="taskDialogTitle">编辑 Todo</h2>
      <div class="dialog-grid">
        <textarea id="taskText" placeholder="Todo 内容"></textarea>
        <div class="field">
          <label for="taskProject">归属项目</label>
          <select id="taskProject"></select>
        </div>
        <div class="field">
          <label for="taskStartTime">计划开始时间</label>
          <input id="taskStartTime" type="time" step="300">
        </div>
        <input id="taskNote" type="text" placeholder="备注，可选">
      </div>
      <div class="dialog-actions">
        <button class="ghost" type="button" id="taskCancelBtn">取消</button>
        <button class="primary" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="projectListDialog">
    <div class="dialog-body">
      <h2>全部项目</h2>
      <div class="project-list" id="projectListBody"></div>
      <div class="dialog-actions">
        <button class="ghost" type="button" id="projectListCloseBtn">关闭</button>
        <button class="primary" type="button" id="projectListAddBtn">添加项目</button>
      </div>
    </div>
  </dialog>

  <dialog id="completeDialog">
    <form class="dialog-body" id="completeForm" method="dialog">
      <h2>记录完成时间</h2>
      <p>可以填写这条 todo 使用的专注时间，单位为分钟；不填也可以直接完成。</p>
      <div class="time-input-row">
        <div class="field">
          <label for="completeTaskName">Todo</label>
          <input id="completeTaskName" type="text" readonly>
        </div>
        <div class="field">
          <label for="completeMinutes">专注时间</label>
          <div class="minute-with-unit">
            <input id="completeMinutes" type="number" min="0" step="1" placeholder="输入">
            <span class="minute-unit">分钟</span>
          </div>
        </div>
      </div>
      <fieldset class="rating-options">
        <legend>完成评价</legend>
        <label><input type="radio" name="completionRating" value="baseline">🌱 保底</label>
        <label><input type="radio" name="completionRating" value="partial" checked>◐ 部分</label>
        <label><input type="radio" name="completionRating" value="full">🏁 全部</label>
      </fieldset>
      <div class="dialog-actions">
        <button class="ghost" type="button" id="completeCancelBtn">取消</button>
        <button class="primary" type="submit">完成</button>
      </div>
    </form>
  </dialog>

  <dialog id="timePieDialog">
    <div class="dialog-body">
      <h2 id="timePieTitle">时间分布</h2>
      <div class="pie-layout">
        <div class="pie-wrap">
          <div class="pie-chart" id="pieChart"></div>
          <div class="pie-center"><span>总计</span><strong id="pieTotal">0分钟</strong></div>
        </div>
        <div class="pie-legend" id="pieLegend"></div>
      </div>
      <div class="dialog-actions">
        <button class="primary" type="button" id="timePieCloseBtn">关闭</button>
      </div>
    </div>
  </dialog>

  <dialog id="reviewDialog">
    <div class="dialog-body">
      <h2>确认历史任务状态</h2>
      <p id="reviewIntro"></p>
      <div id="reviewBody"></div>
      <div class="dialog-actions">
        <button class="ghost" type="button" id="reviewKeepBtn">暂不完成</button>
        <button class="primary" type="button" id="reviewDoneBtn">确认完成</button>
      </div>
    </div>
  </dialog>

  <script>
    const STORAGE_KEY = "daily-todo-table-v1";
    const UNASSIGNED_PROJECT = "未归类";

    const state = loadData();
    state.selectedDate = formatDate(new Date());
    state.rangeStart = state.selectedDate;
    state.rangeEnd = "";
    state.viewMode = "date";
    state.editingProjectId = null;
    state.editingTaskId = null;
    state.reviewQueue = [];
    state.reviewIndex = 0;
    state.draggingTaskId = null;
    state.completingTaskId = null;

    const els = {
      todayBtn: document.querySelector("#todayBtn"),
      tomorrowBtn: document.querySelector("#tomorrowBtn"),
      rangeStart: document.querySelector("#rangeStart"),
      rangeEnd: document.querySelector("#rangeEnd"),
      clearRangeBtn: document.querySelector("#clearRangeBtn"),
      showAllBtn: document.querySelector("#showAllBtn"),
      projectHint: document.querySelector("#projectHint"),
      manageProjectsBtn: document.querySelector("#manageProjectsBtn"),
      projectRail: document.querySelector("#projectRail"),
      dailyView: document.querySelector("#dailyView"),
      calendarView: document.querySelector("#calendarView"),
      calendarTitle: document.querySelector("#calendarTitle"),
      calendarGrid: document.querySelector("#calendarGrid"),
      totalCount: document.querySelector("#totalCount"),
      pendingCount: document.querySelector("#pendingCount"),
      doneCount: document.querySelector("#doneCount"),
      doneRate: document.querySelector("#doneRate"),
      focusTimeBtn: document.querySelector("#focusTimeBtn"),
      focusTime: document.querySelector("#focusTime"),
      resetSortBtn: document.querySelector("#resetSortBtn"),
      taskBody: document.querySelector("#taskBody"),
      emptyState: document.querySelector("#emptyState"),
      hiddenNote: document.querySelector("#hiddenNote"),
      hoverTooltip: document.querySelector("#hoverTooltip"),
      projectDialog: document.querySelector("#projectDialog"),
      projectForm: document.querySelector("#projectForm"),
      projectDialogTitle: document.querySelector("#projectDialogTitle"),
      projectName: document.querySelector("#projectName"),
      projectDdl: document.querySelector("#projectDdl"),
      projectCancelBtn: document.querySelector("#projectCancelBtn"),
      projectListDialog: document.querySelector("#projectListDialog"),
      projectListBody: document.querySelector("#projectListBody"),
      projectListCloseBtn: document.querySelector("#projectListCloseBtn"),
      projectListAddBtn: document.querySelector("#projectListAddBtn"),
      taskDialog: document.querySelector("#taskDialog"),
      taskForm: document.querySelector("#taskForm"),
      taskDialogTitle: document.querySelector("#taskDialogTitle"),
      taskText: document.querySelector("#taskText"),
      taskProject: document.querySelector("#taskProject"),
      taskStartTime: document.querySelector("#taskStartTime"),
      taskNote: document.querySelector("#taskNote"),
      taskCancelBtn: document.querySelector("#taskCancelBtn"),
      completeDialog: document.querySelector("#completeDialog"),
      completeForm: document.querySelector("#completeForm"),
      completeTaskName: document.querySelector("#completeTaskName"),
      completeMinutes: document.querySelector("#completeMinutes"),
      completeRating: document.querySelectorAll('input[name="completionRating"]'),
      completeCancelBtn: document.querySelector("#completeCancelBtn"),
      timePieDialog: document.querySelector("#timePieDialog"),
      timePieTitle: document.querySelector("#timePieTitle"),
      pieChart: document.querySelector("#pieChart"),
      pieTotal: document.querySelector("#pieTotal"),
      pieLegend: document.querySelector("#pieLegend"),
      timePieCloseBtn: document.querySelector("#timePieCloseBtn"),
      reviewDialog: document.querySelector("#reviewDialog"),
      reviewIntro: document.querySelector("#reviewIntro"),
      reviewBody: document.querySelector("#reviewBody"),
      reviewKeepBtn: document.querySelector("#reviewKeepBtn"),
      reviewDoneBtn: document.querySelector("#reviewDoneBtn")
    };

    init();

    function init() {
      els.rangeStart.value = state.selectedDate;

      els.todayBtn.addEventListener("click", () => selectSingleDate(formatDate(new Date())));
      els.tomorrowBtn.addEventListener("click", () => selectSingleDate(addDays(formatDate(new Date()), 1)));
      els.rangeStart.addEventListener("change", updateDateControls);
      els.rangeEnd.addEventListener("change", updateDateControls);
      els.clearRangeBtn.addEventListener("click", () => selectSingleDate(els.rangeStart.value || formatDate(new Date())));
      els.showAllBtn.addEventListener("click", toggleAll);

      els.projectRail.addEventListener("click", handleProjectRailClick);
      els.projectRail.addEventListener("dblclick", editProjectField);
      els.projectRail.addEventListener("contextmenu", editProjectField);
      els.manageProjectsBtn.addEventListener("click", openProjectList);
      els.projectForm.addEventListener("submit", saveProject);
      els.projectCancelBtn.addEventListener("click", () => els.projectDialog.close());
      els.projectListBody.addEventListener("click", handleProjectListClick);
      els.projectListBody.addEventListener("dblclick", editProjectField);
      els.projectListBody.addEventListener("contextmenu", editProjectField);
      els.projectListCloseBtn.addEventListener("click", () => els.projectListDialog.close());
      els.projectListAddBtn.addEventListener("click", () => {
        createDefaultProject();
        renderProjectListDialog();
      });

      els.taskBody.addEventListener("click", handleTaskClick);
      els.taskBody.addEventListener("mouseover", scheduleHoverTooltip);
      els.taskBody.addEventListener("mousemove", moveHoverTooltip);
      els.taskBody.addEventListener("mouseout", hideHoverTooltip);
      els.taskBody.addEventListener("dblclick", editTaskField);
      els.taskBody.addEventListener("contextmenu", editTaskField);
      els.resetSortBtn.addEventListener("click", resetDefaultSort);
      els.taskBody.addEventListener("dragstart", handleDragStart);
      els.taskBody.addEventListener("dragover", handleDragOver);
      els.taskBody.addEventListener("drop", handleDrop);
      els.taskBody.addEventListener("dragend", handleDragEnd);
      els.taskForm.addEventListener("submit", saveTask);
      els.taskCancelBtn.addEventListener("click", () => els.taskDialog.close());
      els.completeForm.addEventListener("submit", saveCompletionTime);
      els.completeCancelBtn.addEventListener("click", () => {
        state.completingTaskId = null;
        els.completeDialog.close();
      });
      els.focusTimeBtn.addEventListener("click", openTimePie);
      els.timePieCloseBtn.addEventListener("click", () => els.timePieDialog.close());

      els.reviewKeepBtn.addEventListener("click", () => answerReview(false));
      els.reviewDoneBtn.addEventListener("click", () => answerReview(true));

      render();
      openDailyReview();
    }

    function updateDateControls() {
      if (!els.rangeStart.value) return;

      state.rangeStart = els.rangeStart.value;
      state.rangeEnd = els.rangeEnd.value;
      state.selectedDate = els.rangeStart.value;

      if (state.rangeEnd && state.rangeEnd < state.rangeStart) {
        [state.rangeStart, state.rangeEnd] = [state.rangeEnd, state.rangeStart];
        els.rangeStart.value = state.rangeStart;
        els.rangeEnd.value = state.rangeEnd;
      }

      state.viewMode = state.rangeEnd ? "calendar" : "date";
      render();
    }

    function selectSingleDate(date) {
      state.selectedDate = date;
      state.rangeStart = date;
      state.rangeEnd = "";
      state.viewMode = "date";
      els.rangeStart.value = date;
      els.rangeEnd.value = "";
      render();
    }

    function toggleAll() {
      state.viewMode = state.viewMode === "all" ? "date" : "all";
      if (state.viewMode === "date") {
        state.rangeEnd = "";
        els.rangeEnd.value = "";
      }
      render();
    }

    function handleProjectRailClick(event) {
      const button = event.target.closest("button[data-project-action]");
      const card = event.target.closest("[data-project-id]");

      if (event.target.closest("[data-open-project-list]")) {
        openProjectList();
        return;
      }

      if (event.target.closest("[data-add-project]")) {
        createDefaultProject();
        return;
      }

      if (!button || !card) return;
      const project = findProject(card.dataset.projectId);
      if (!project) return;

      if (button.dataset.projectAction === "delete") {
        deleteProject(project);
      }
    }

    function editProjectField(event) {
      if (event.target.closest("button")) return;
      const fieldEl = event.target.closest("[data-project-field]");
      const card = event.target.closest("[data-project-id]");
      if (!fieldEl || !card) return;
      const project = findProject(card.dataset.projectId);
      if (!project) return;
      event.preventDefault();

      const field = fieldEl.dataset.projectField;
      if (field === "ddl") {
        startScheduleEdit(fieldEl, project);
        return;
      }

      startInlineEdit(fieldEl, {
        type: "text",
        value: project.name,
        save: (value) => { project.name = value.trim() || "未命名"; }
      }, () => {
        saveData();
        render();
        if (els.projectListDialog.open) renderProjectListDialog();
      });
    }

    function startScheduleEdit(fieldEl, project) {
      if (fieldEl.querySelector("input, select")) return;
      const wrapper = document.createElement("div");
      wrapper.className = "schedule-editor";
      const modeSelect = document.createElement("select");
      modeSelect.className = "inline-select";
      modeSelect.innerHTML = `
        <option value="dated">指定日期</option>
        <option value="plannedLater">待计划</option>
      `;
      modeSelect.value = getProjectScheduleMode(project) === "plannedLater" ? "plannedLater" : "dated";

      const dateInput = document.createElement("input");
      dateInput.className = "inline-date";
      dateInput.type = "date";
      dateInput.value = project.ddl || "";
      dateInput.hidden = modeSelect.value !== "dated";

      let finished = false;
      const save = () => {
        if (finished) return;
        finished = true;
        if (modeSelect.value === "plannedLater") {
          project.scheduleMode = "plannedLater";
          project.ddl = "";
        } else if (dateInput.value) {
          project.scheduleMode = "dated";
          project.ddl = dateInput.value;
        } else {
          project.scheduleMode = "empty";
          project.ddl = "";
        }
        saveData();
        render();
        if (els.projectListDialog.open) renderProjectListDialog();
      };

      modeSelect.addEventListener("change", () => {
        dateInput.hidden = modeSelect.value !== "dated";
        if (modeSelect.value === "plannedLater") save();
        else dateInput.focus();
      });
      dateInput.addEventListener("change", save);
      wrapper.addEventListener("keydown", (event) => {
        if (event.key === "Enter") save();
        if (event.key === "Escape") {
          finished = true;
          render();
          if (els.projectListDialog.open) renderProjectListDialog();
        }
      });
      wrapper.addEventListener("focusout", () => setTimeout(() => {
        if (!wrapper.contains(document.activeElement)) save();
      }));

      wrapper.append(modeSelect, dateInput);
      fieldEl.replaceChildren(wrapper);
      modeSelect.focus();
    }

    function createDefaultProject() {
      const hasUnnamed = state.projects.some(isUnnamedProject);
      if (hasUnnamed && !window.confirm("还有未命名项目未处理，仍要继续添加吗？")) return null;
      const project = {
        id: crypto.randomUUID ? crypto.randomUUID() : `project-${Date.now()}`,
        name: "未命名",
        ddl: "",
        scheduleMode: "empty",
        createdAt: new Date().toISOString()
      };
      state.projects.push(project);
      saveData();
      render();
      return project;
    }

    function openProjectDialog(project = null) {
      state.editingProjectId = project ? project.id : null;
      els.projectDialogTitle.textContent = project ? "修改项目" : "添加项目";
      els.projectName.value = project ? project.name : "";
      els.projectDdl.value = project ? project.ddl || "" : "";
      els.projectDialog.showModal();
      els.projectName.focus();
    }

    function saveProject(event) {
      event.preventDefault();
      const name = els.projectName.value.trim() || "未命名";
      const ddl = els.projectDdl.value;

      if (state.editingProjectId) {
        const project = findProject(state.editingProjectId);
        if (project) {
          project.name = name;
          project.ddl = ddl;
          project.scheduleMode = ddl ? "dated" : (project.scheduleMode === "plannedLater" ? "plannedLater" : "empty");
        }
      } else {
        state.projects.push({
          id: crypto.randomUUID ? crypto.randomUUID() : `project-${Date.now()}`,
          name,
          ddl,
          scheduleMode: ddl ? "dated" : "empty",
          createdAt: new Date().toISOString()
        });
      }

      state.editingProjectId = null;
      els.projectDialog.close();
      saveData();
      render();
      renderProjectListDialog();
    }

    function openProjectList() {
      renderProjectListDialog();
      els.projectListDialog.showModal();
    }

    function renderProjectListDialog() {
      const draftProjects = state.projects.filter(isDraftProject).sort(compareProjects);
      const groups = getProjectListGroups();
      els.projectListBody.innerHTML = state.projects.length
        ? draftProjects.map(projectListItem).join("") + groups.map(projectListGroup).join("")
        : `<div class="empty">还没有项目。</div>`;
    }

    function getProjectListGroups() {
      const today = formatDate(new Date());
      const completed = state.projects
        .filter((project) => !isDraftProject(project) && hasProjectDdl(project) && project.ddl < today)
        .sort(compareProjects);
      const active = state.projects
        .filter((project) => !isDraftProject(project) && hasProjectDdl(project) && project.ddl >= today)
        .sort(compareProjects);
      const unplanned = state.projects
        .filter((project) => isPlannedLater(project))
        .sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));
      return [
        { title: "进行中", hint: "有 DDL 的项目", projects: active },
        { title: "待计划", hint: "暂不排期", projects: unplanned },
        { title: "已完成", hint: "DDL 已经过了", projects: completed }
      ];
    }

    function projectListGroup(group) {
      return `
        <section class="project-list-group">
          <div class="project-list-heading"><strong>${group.title}</strong><span>${group.projects.length} 个 · ${group.hint}</span></div>
          ${group.projects.length ? group.projects.map(projectListItem).join("") : `<div class="empty">暂无项目</div>`}
        </section>
      `;
    }

    function projectListItem(project) {
      const ddl = hasProjectDdl(project) ? friendlyDate(project.ddl) : (getProjectScheduleMode(project) === "plannedLater" ? "待计划" : "未设置日期");
      return `
        <div class="project-list-item" data-project-id="${project.id}" title="双击或右键修改项目">
          <div class="project-name" data-project-field="name" title="双击或右键修改项目名称">${escapeHtml(project.name)}</div>
          <div class="project-ddl" data-project-field="ddl" title="双击或右键修改 DDL">${ddl}</div>
          <div class="project-card-actions">
            <button class="icon-button" type="button" data-project-action="delete" title="删除项目" aria-label="删除项目">×</button>
          </div>
        </div>
      `;
    }

    function handleProjectListClick(event) {
      const button = event.target.closest("button[data-project-action]");
      const row = event.target.closest("[data-project-id]");
      if (!button || !row) return;
      const project = findProject(row.dataset.projectId);
      if (!project) return;

      if (button.dataset.projectAction === "delete") {
        deleteProject(project, true);
      }
    }

    function deleteProject(project, refreshList = false) {
      const linkedTasks = state.tasks.filter((task) => task.projectId === project.id);
      const completedCount = linkedTasks.filter((task) => task.done).length;
      if (completedCount) {
        const ok = window.confirm(`项目“${project.name}”下有 ${completedCount} 条已完成 todo。删除项目后，这些 todo 不会被删除，但会归入“未归类”。确认删除项目吗？`);
        if (!ok) return;
      }
      state.tasks.forEach((task) => {
        if (task.projectId === project.id) task.projectId = "";
      });
      state.projects = state.projects.filter((item) => item.id !== project.id);
      saveData();
      render();
      if (refreshList) renderProjectListDialog();
    }

    function handleTaskClick(event) {
      const addButton = event.target.closest("[data-add-task]");
      if (addButton) {
        addBlankTask();
        return;
      }

      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const task = state.tasks.find((item) => item.id === button.dataset.id);
      if (!task) return;

      if (button.dataset.action === "toggle") {
        if (task.done) {
          task.done = false;
          task.completedAt = null;
          task.completedDate = "";
          task.durationMinutes = 0;
          task.completionRating = "";
        } else {
          openCompletionDialog(task);
          return;
        }
      }

      if (button.dataset.action === "edit") {
        openTaskDialog(task);
        return;
      }

      if (button.dataset.action === "delete") {
        if (task.done && !window.confirm("这条 todo 已完成，删除后完成记录和专注时间也会一起删除。确认删除吗？")) return;
        state.tasks = state.tasks.filter((item) => item.id !== task.id);
      }

      saveData();
      render();
    }

    function addBlankTask() {
      const task = {
        id: crypto.randomUUID ? crypto.randomUUID() : `task-${Date.now()}`,
        text: "未命名",
        note: "",
        projectId: "",
        plannedStart: "",
        targetDate: state.viewMode === "all" ? formatDate(new Date()) : state.selectedDate,
        done: false,
        createdAt: new Date().toISOString(),
        completedAt: null,
        completedDate: "",
        durationMinutes: 0,
        completionRating: "",
        manualOrder: false,
        order: nextOrder()
      };
      state.tasks.unshift(task);
      saveData();
      render();
    }

    function openTaskDialog(task) {
      state.editingTaskId = task.id;
      els.taskDialogTitle.textContent = task.text ? "修改 Todo" : "完善 Todo";
      els.taskText.value = task.text;
      els.taskStartTime.value = task.plannedStart || "";
      els.taskNote.value = task.note || "";
      renderProjectOptions(els.taskProject, task.projectId || "");
      els.taskDialog.showModal();
      els.taskText.focus();
    }

    function saveTask(event) {
      event.preventDefault();
      const task = state.tasks.find((item) => item.id === state.editingTaskId);
      if (task) {
        task.text = els.taskText.value.trim();
        task.note = els.taskNote.value.trim();
        task.projectId = els.taskProject.value || "";
        task.plannedStart = els.taskStartTime.value || "";
        if (!task.manualOrder) task.order = nextOrder();
      }
      state.editingTaskId = null;
      els.taskDialog.close();
      saveData();
      render();
    }

    function openCompletionDialog(task) {
      state.completingTaskId = task.id;
      els.completeTaskName.value = task.text || "空白 Todo";
      els.completeMinutes.value = task.durationMinutes || "";
      els.completeRating.forEach((input) => {
        input.checked = input.value === (task.completionRating || "partial");
      });
      els.completeDialog.showModal();
      els.completeMinutes.focus();
    }

    function saveCompletionTime(event) {
      event.preventDefault();
      const task = state.tasks.find((item) => item.id === state.completingTaskId);
      if (task) {
        task.done = true;
        task.completedAt = new Date().toISOString();
        task.completedDate = formatDate(new Date());
        task.durationMinutes = Math.max(0, Number.parseInt(els.completeMinutes.value || "0", 10) || 0);
        task.completionRating = [...els.completeRating].find((input) => input.checked)?.value || "partial";
      }
      state.completingTaskId = null;
      els.completeDialog.close();
      saveData();
      render();
    }

    let tooltipTimer = null;
    let tooltipTarget = null;

    function scheduleHoverTooltip(event) {
      const target = event.target.closest("[data-tooltip]");
      if (!target || !els.taskBody.contains(target) || !isTextOverflowing(target)) return;
      tooltipTarget = target;
      clearTimeout(tooltipTimer);
      tooltipTimer = setTimeout(() => {
        if (tooltipTarget !== target || !isTextOverflowing(target)) return;
        els.hoverTooltip.textContent = target.dataset.tooltip;
        els.hoverTooltip.hidden = false;
        positionHoverTooltip(event);
        requestAnimationFrame(() => els.hoverTooltip.classList.add("visible"));
      }, 700);
    }

    function isTextOverflowing(element) {
      return element.scrollWidth > element.clientWidth + 1;
    }

    function moveHoverTooltip(event) {
      if (!els.hoverTooltip.hidden) positionHoverTooltip(event);
    }

    function hideHoverTooltip(event) {
      const target = event.target.closest("[data-tooltip]");
      if (!target) return;
      const related = event.relatedTarget;
      if (related && target.contains(related)) return;
      clearTimeout(tooltipTimer);
      tooltipTarget = null;
      els.hoverTooltip.classList.remove("visible");
      els.hoverTooltip.hidden = true;
    }

    function positionHoverTooltip(event) {
      const offset = 14;
      const rect = els.hoverTooltip.getBoundingClientRect();
      let left = event.clientX + offset;
      let top = event.clientY + offset;
      if (left + rect.width > window.innerWidth - 12) left = window.innerWidth - rect.width - 12;
      if (top + rect.height > window.innerHeight - 12) top = event.clientY - rect.height - offset;
      els.hoverTooltip.style.left = `${Math.max(12, left)}px`;
      els.hoverTooltip.style.top = `${Math.max(12, top)}px`;
    }

    function editTaskField(event) {
      if (event.target.closest("button")) return;
      const fieldEl = event.target.closest("[data-task-field]");
      const row = event.target.closest("tr[data-task-id]");
      if (!fieldEl || !row) return;
      const task = state.tasks.find((item) => item.id === row.dataset.taskId);
      if (!task) return;
      const field = fieldEl.dataset.taskField;
      if (task.done && field !== "projectId") return;
      event.preventDefault();

      const configByField = {
        text: { type: "text", value: task.text || "", save: (value) => { task.text = value.trim() || "未命名"; } },
        projectId: { type: "select", value: task.projectId || "", save: (value) => { task.projectId = value; } },
        plannedStart: { type: "time", value: task.plannedStart || "", save: (value) => { task.plannedStart = value; task.manualOrder = false; } },
        targetDate: { type: "date", value: task.targetDate || formatDate(new Date()), save: (value) => { task.targetDate = value || formatDate(new Date()); } }
      };
      const config = configByField[field];
      if (!config) return;

      startInlineEdit(fieldEl, config, () => {
        saveData();
        render();
      });
    }

    function startInlineEdit(fieldEl, config, afterSave) {
      if (fieldEl.querySelector("input, select")) return;
      const editor = document.createElement(config.type === "select" ? "select" : "input");
      editor.className = config.type === "select" ? "inline-select" : "inline-input";
      if (config.type !== "select") editor.type = config.type;
      if (config.type === "time") {
        editor.step = 300;
        editor.className = "inline-time";
      }
      if (config.type === "date") editor.className = "inline-date";
      if (config.type === "select") editor.innerHTML = projectOptionsHtml(config.value);
      editor.value = config.value || "";

      let finished = false;
      const finish = (shouldSave) => {
        if (finished) return;
        finished = true;
        if (shouldSave) {
          config.save(editor.value);
          afterSave();
        } else {
          render();
          if (els.projectListDialog.open) renderProjectListDialog();
        }
      };

      editor.addEventListener("keydown", (event) => {
        if (event.key === "Enter") finish(true);
        if (event.key === "Escape") finish(false);
      });
      editor.addEventListener("blur", () => finish(true));
      if (["select", "date", "time"].includes(config.type)) {
        editor.addEventListener("change", () => finish(true));
      }

      fieldEl.replaceChildren(editor);
      editor.focus();
      if (editor.select && config.type === "text") editor.select();
    }

    function resetDefaultSort() {
      getVisibleTasks().forEach((task, index) => {
        task.manualOrder = false;
        task.order = index + 1;
      });
      saveData();
      render();
    }

    function handleDragStart(event) {
      const row = event.target.closest("tr[data-task-id]");
      if (!row) return;
      state.draggingTaskId = row.dataset.taskId;
      row.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", row.dataset.taskId);
    }

    function handleDragOver(event) {
      if (!event.target.closest("tr[data-task-id]")) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
    }

    function handleDrop(event) {
      const row = event.target.closest("tr[data-task-id]");
      if (!row || !state.draggingTaskId || row.dataset.taskId === state.draggingTaskId) return;
      event.preventDefault();
      reorderVisibleTasks(state.draggingTaskId, row.dataset.taskId);
      saveData();
      render();
    }

    function handleDragEnd() {
      state.draggingTaskId = null;
      document.querySelectorAll(".dragging").forEach((item) => item.classList.remove("dragging"));
    }

    function reorderVisibleTasks(sourceId, targetId) {
      const visible = getVisibleTasks();
      const sourceIndex = visible.findIndex((task) => task.id === sourceId);
      const targetIndex = visible.findIndex((task) => task.id === targetId);
      if (sourceIndex < 0 || targetIndex < 0) return;

      const [source] = visible.splice(sourceIndex, 1);
      visible.splice(targetIndex, 0, source);
      visible.forEach((task, index) => {
        task.order = index + 1;
        task.manualOrder = true;
      });
    }

    function getVisibleTasks() {
      const today = formatDate(new Date());
      return state.tasks.filter((task) => {
        if (state.viewMode === "all") return true;
        if (state.viewMode === "calendar") return task.targetDate >= state.rangeStart && task.targetDate <= state.rangeEnd;
        if (task.targetDate !== state.selectedDate) return false;
        if (!task.done && task.targetDate < today) return false;
        return true;
      }).sort(compareTasks);
    }

    function getHiddenOverdueCount() {
      const today = formatDate(new Date());
      return state.tasks.filter((task) => !task.done && task.targetDate < today).length;
    }

    function render() {
      renderTopbar();
      renderProjects();

      if (state.viewMode === "calendar") {
        els.dailyView.classList.add("is-hidden");
        els.calendarView.classList.remove("is-hidden");
        renderCalendar();
        return;
      }

      els.calendarView.classList.add("is-hidden");
      els.dailyView.classList.remove("is-hidden");
      renderDaily();
    }

    function renderTopbar() {
      const today = formatDate(new Date());
      const tomorrow = addDays(today, 1);

      els.todayBtn.classList.toggle("active", state.viewMode === "date" && state.selectedDate === today);
      els.tomorrowBtn.classList.toggle("active", state.viewMode === "date" && state.selectedDate === tomorrow);
      els.showAllBtn.textContent = state.viewMode === "all" ? "返回日期" : "全部记录";
      els.clearRangeBtn.hidden = !state.rangeEnd && state.viewMode !== "calendar";
    }

    function renderProjects() {
      const draftProjects = [...state.projects]
        .filter(isDraftProject)
        .sort(compareProjects);
      const ddlProjects = [...state.projects]
        .filter((project) => !isDraftProject(project) && hasProjectDdl(project))
        .sort(compareProjects);
      const plannedLaterCount = state.projects.filter((project) => isPlannedLater(project)).length;
      const cardCount = draftProjects.length + ddlProjects.length + (plannedLaterCount ? 1 : 0);
      els.projectHint.textContent = cardCount > 3 ? "左右滑动查看更多" : "";
      els.projectRail.innerHTML = draftProjects.map(projectCard).join("")
        + ddlProjects.map(projectCard).join("")
        + (plannedLaterCount ? otherProjectCard(plannedLaterCount) : "")
        + addProjectCard();
    }

    function projectCard(project) {
      const mode = getProjectScheduleMode(project);
      const draft = isDraftProject(project);
      const countdown = hasProjectDdl(project) ? getDdlCountdown(project.ddl) : { label: "", variant: "waiting-project", longRange: false };
      const scheduleText = mode === "plannedLater" ? "待计划" : "设置日期 / 待计划";
      const scheduleMarkup = hasProjectDdl(project)
        ? `<div class="project-countdown" data-project-field="ddl" title="双击或右键修改 DDL">
              <div class="days-left ${countdown.longRange ? "long-range" : ""}">${countdown.label}</div>
              <div class="countdown-text">${countdown.longRange ? "长期项目" : `距离 ${friendlyDate(project.ddl)}`}</div>
            </div>`
        : `<div class="project-date-placeholder" data-project-field="ddl" title="双击或右键设置日期或待计划">${scheduleText}</div>`;
      return `
        <div class="project-card has-ddl ${draft ? "waiting-project" : countdown.variant}" data-project-id="${project.id}" data-schedule-mode="${mode}">
          <div class="project-content">
            <div class="project-name" data-project-field="name" title="双击或右键修改项目名称">${escapeHtml(project.name)}</div>
            ${scheduleMarkup}
          </div>
          <div class="project-card-actions">
            <button class="icon-button" type="button" data-project-action="delete" title="删除项目" aria-label="删除项目">×</button>
          </div>
        </div>
      `;
    }

    function otherProjectCard(count) {
      return `
        <button class="project-card other-card" type="button" data-open-project-list>
          <span>待计划</span>
          <span class="other-count">${count} 个待计划项目</span>
        </button>
      `;
    }

    function addProjectCard() {
      return `
        <button class="project-card add-card" type="button" data-add-project>
          <span>+ 添加项目</span>
        </button>
      `;
    }

    function getDdlCountdown(dateString) {
      const today = new Date(`${formatDate(new Date())}T00:00:00`);
      const ddl = new Date(`${dateString}T00:00:00`);
      const diff = Math.ceil((ddl - today) / 86400000);
      if (diff > 365) return { label: "一年后", variant: "due-later", longRange: true };
      if (diff > 30) return { label: `${diff}<small>天</small>`, variant: "due-later", longRange: false };
      if (diff >= 0) return { label: `${diff}<small>天</small>`, variant: "due-soon", longRange: false };
      return { label: `${Math.abs(diff)}<small>天</small>`, variant: "due-soon", longRange: false };
    }

    function renderDaily() {
      const visibleTasks = getVisibleTasks();
      const pending = visibleTasks.filter((task) => !task.done).length;
      const done = visibleTasks.filter((task) => task.done).length;
      const total = visibleTasks.length;

      els.totalCount.textContent = total;
      els.pendingCount.textContent = pending;
      els.doneCount.textContent = done;
      els.doneRate.textContent = total ? `${Math.round((done / total) * 100)}%` : "0%";
      els.focusTime.textContent = formatDuration(sumMinutes(visibleTasks));

      els.taskBody.innerHTML = addTaskRow() + renderTaskRows(visibleTasks);
      els.emptyState.hidden = visibleTasks.length > 0;

      const hiddenCount = getHiddenOverdueCount();
      els.hiddenNote.textContent = hiddenCount
        ? `已隐藏 ${hiddenCount} 条早于今天且未完成的红色任务。需要查看时点“全部记录”。`
        : "";

      if (state.viewMode === "all") {
        els.hiddenNote.textContent = "全部记录会显示历史红色任务；日常日期视图会自动隐藏早于今天的未完成任务。";
      }
    }

    function renderTaskRows(tasks) {
      let currentSection = "";
      return tasks.map((task) => {
        const section = getTimeSection(task.plannedStart);
        const divider = section && section !== currentSection
          ? timeSectionRow(section)
          : "";
        if (section) currentSection = section;
        return divider + taskRow(task);
      }).join("");
    }

    function timeSectionRow(section) {
      return `<tr class="time-section-row"><td colspan="8">${section}</td></tr>`;
    }

    function getTimeSection(time) {
      if (!time) return "";
      return time < "12:00" ? "上午" : "下午";
    }

    function addTaskRow() {
      return `
        <tr class="add-row">
          <td colspan="8">
            <button class="add-todo" type="button" data-add-task title="添加空白 todo" aria-label="添加空白 todo">+</button>
          </td>
        </tr>
      `;
    }

    function taskRow(task) {
      const project = getProjectForTask(task);
      const status = task.done ? "已完成" : "未完成";
      const actionLabel = task.done ? "↺" : "✓";
      const actionTitle = task.done ? "标记为未完成" : "标记为完成";
      const rowClass = task.done ? "done" : "pending";
      const text = task.text || "空白 Todo";
      const note = task.note ? `<div class="task-note">${escapeHtml(task.note)}</div>` : "";
      const rating = getCompletionRating(task.completionRating);
      const completedDate = task.completedDate
        ? `${friendlyDate(task.completedDate)}${task.durationMinutes ? ` · ${formatDuration(task.durationMinutes)}` : ""}${rating ? ` · ${rating.emoji}` : ""}`
        : "未完成";

      return `
        <tr class="task-row ${rowClass}" draggable="true" data-task-id="${task.id}">
          <td><span class="drag-handle">↕</span></td>
          <td>
            <div class="task-title" data-task-field="text" data-tooltip="${escapeHtml(text)}" aria-label="${escapeHtml(text)}">${escapeHtml(text)}</div>
            ${note}
          </td>
          <td>
            <div class="chip" data-task-field="projectId" title="双击或右键修改项目">${escapeHtml(project.name)}</div>
          </td>
          <td><span class="planned-time ${task.plannedStart ? "" : "empty-time"}" data-task-field="plannedStart" title="${task.done ? "" : "双击或右键修改计划开始时间"}">${formatPlannedTime(task.plannedStart)}</span></td>
          <td><span data-task-field="targetDate" title="${task.done ? "" : "双击或右键修改日期"}">${friendlyDate(task.targetDate)}</span></td>
          <td><span class="status">${status}</span></td>
          <td><span class="completion-record">${completedDate}</span></td>
          <td>
            <div class="actions">
              <button class="icon-button ${task.done ? "action-secondary" : "action-complete"}" type="button" data-action="toggle" data-id="${task.id}" title="${actionTitle}" aria-label="${actionTitle}">${actionLabel}</button>
              <button class="icon-button action-danger" type="button" data-action="delete" data-id="${task.id}" title="删除 Todo" aria-label="删除 Todo">×</button>
            </div>
          </td>
        </tr>
      `;
    }

    function renderCalendar() {
      const start = state.rangeStart;
      const end = state.rangeEnd;
      els.calendarTitle.textContent = `${friendlyDate(start)} - ${friendlyDate(end)}`;
      els.calendarGrid.innerHTML = renderMonthCalendars(start, end);
    }

    function dayCard(date) {
      const today = formatDate(new Date());
      const tasks = state.tasks.filter((task) => task.targetDate === date);
      const projectGroups = groupTasksByProject(tasks);
      const content = projectGroups.length
        ? projectGroups.map(calendarProject).join("")
        : `<div class="empty">没有 todo</div>`;

      return `
        <article class="day-card ${date === today ? "today" : ""}">
          <div class="day-head">
            <span>${friendlyDate(date)}</span>
            <span class="day-count">${tasks.length} 条</span>
          </div>
          <div class="calendar-projects">${content}</div>
        </article>
      `;
    }

    function renderMonthCalendars(start, end) {
      const months = enumerateMonths(start, end);
      return months.map((monthDate) => {
        const year = monthDate.getFullYear();
        const month = monthDate.getMonth();
        const first = new Date(year, month, 1);
        const last = new Date(year, month + 1, 0);
        const cells = [];
        for (let i = 0; i < first.getDay(); i += 1) cells.push(`<div class="day-card outside-range"></div>`);
        for (let day = 1; day <= last.getDate(); day += 1) {
          const date = formatDate(new Date(year, month, day));
          cells.push(date >= start && date <= end ? dayCard(date) : `<div class="day-card outside-range"></div>`);
        }
        return `
          <section class="month-section">
            <div class="month-title">${year}年${month + 1}月</div>
            <div class="weekday-row"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
            <div class="month-grid">${cells.join("")}</div>
          </section>
        `;
      }).join("");
    }

    function calendarProject(group) {
      const done = group.tasks.filter((task) => task.done).length;
      const minutes = sumMinutes(group.tasks);
      const className = group.project.id ? "calendar-project" : "calendar-project unassigned";
      return `
        <div class="${className}">
          <strong title="${escapeHtml(group.project.name)}">${escapeHtml(group.project.name)}${group.project.id ? "" : " · 待整理"}</strong>
          <span>${group.tasks.length} 条 todo，完成 ${done} 条</span>
          <span>累计时间：${formatDuration(minutes)}</span>
        </div>
      `;
    }

    function groupTasksByProject(tasks) {
      const map = new Map();
      tasks.forEach((task) => {
        const project = getProjectForTask(task);
        if (!map.has(project.id)) {
          map.set(project.id, {
            project,
            tasks: []
          });
        }
        map.get(project.id).tasks.push(task);
      });

      return [...map.values()].sort((a, b) => {
        if (!a.project.id && b.project.id) return 1;
        if (a.project.id && !b.project.id) return -1;
        return sumMinutes(b.tasks) - sumMinutes(a.tasks) || compareProjects(a.project, b.project);
      });
    }

    function openDailyReview() {
      const today = formatDate(new Date());
      if (state.lastReviewDate === today) return;

      state.reviewQueue = state.tasks
        .filter((task) => !task.done && task.targetDate < today)
        .sort((a, b) => a.targetDate.localeCompare(b.targetDate) || compareTasks(a, b));

      if (!state.reviewQueue.length) {
        state.lastReviewDate = today;
        saveData();
        return;
      }

      state.reviewIndex = 0;
      renderReview();
      els.reviewDialog.showModal();
    }

    function renderReview() {
      const task = state.reviewQueue[state.reviewIndex];
      if (!task) {
        state.lastReviewDate = formatDate(new Date());
        saveData();
        els.reviewDialog.close();
        render();
        return;
      }

      const project = getProjectForTask(task);
      els.reviewIntro.textContent = `${friendlyDate(task.targetDate)} 的 todo 还没有确认状态。`;
      els.reviewBody.innerHTML = `
        <div class="review-task">
          <strong>${escapeHtml(task.text || "空白 Todo")}</strong>
          <div class="review-meta">${escapeHtml(project.name)} · ${state.reviewIndex + 1}/${state.reviewQueue.length}</div>
        </div>
      `;
    }

    function answerReview(isDone) {
      const task = state.reviewQueue[state.reviewIndex];
      if (task && isDone) {
        task.done = true;
        task.completedDate = task.targetDate;
        task.completedAt = `${task.targetDate}T23:59:59`;
        task.durationMinutes = task.durationMinutes || 0;
        task.completionRating = task.completionRating || "";
      }
      state.reviewIndex += 1;
      renderReview();
    }

    function renderProjectOptions(select, selectedValue = "") {
      select.innerHTML = projectOptionsHtml(selectedValue);
      select.value = state.projects.some((project) => project.id === selectedValue) ? selectedValue : "";
    }

    function projectOptionsHtml(selectedValue = "") {
      const projects = [...state.projects].sort(compareProjects);
      return [`<option value="" ${selectedValue ? "" : "selected"}>${UNASSIGNED_PROJECT}</option>`]
        .concat(projects.map((project) => `<option value="${project.id}" ${project.id === selectedValue ? "selected" : ""}>${escapeHtml(project.name)}</option>`))
        .join("");
    }

    function compareTasks(a, b) {
      if (state.viewMode === "all" && a.targetDate !== b.targetDate) {
        return b.targetDate.localeCompare(a.targetDate);
      }
      if (a.manualOrder && b.manualOrder) {
        return (a.order || 0) - (b.order || 0) || new Date(b.createdAt) - new Date(a.createdAt);
      }
      if (a.manualOrder !== b.manualOrder) return a.manualOrder ? -1 : 1;
      const aTime = a.plannedStart || "99:99";
      const bTime = b.plannedStart || "99:99";
      if (aTime !== bTime) return aTime.localeCompare(bTime);
      return (a.order || 0) - (b.order || 0) || new Date(b.createdAt) - new Date(a.createdAt);
    }

    function compareProjects(a, b) {
      const aDraft = isDraftProject(a);
      const bDraft = isDraftProject(b);
      if (aDraft !== bDraft) return aDraft ? -1 : 1;
      const aHasDdl = hasProjectDdl(a);
      const bHasDdl = hasProjectDdl(b);
      if (aHasDdl !== bHasDdl) return aHasDdl ? -1 : 1;
      if (aHasDdl && a.ddl !== b.ddl) return a.ddl.localeCompare(b.ddl);
      return a.name.localeCompare(b.name, "zh-CN");
    }

    function isUnnamedProject(project) {
      const name = (project.name || "").trim();
      return name === "未命名" || name === "未命名项目";
    }

    function getProjectScheduleMode(project) {
      if (project.scheduleMode) return project.scheduleMode;
      if (project.ddl) return "dated";
      return isUnnamedProject(project) ? "empty" : "plannedLater";
    }

    function isDraftProject(project) {
      return getProjectScheduleMode(project) === "empty" || isUnnamedProject(project);
    }

    function hasProjectDdl(project) {
      return getProjectScheduleMode(project) === "dated" && Boolean(project.ddl);
    }

    function isPlannedLater(project) {
      return getProjectScheduleMode(project) === "plannedLater" && !isDraftProject(project);
    }

    function findProject(id) {
      return state.projects.find((project) => project.id === id);
    }

    function getProjectForTask(task) {
      return findProject(task.projectId) || {
        id: "",
        name: UNASSIGNED_PROJECT,
        ddl: ""
      };
    }

    function nextOrder() {
      return Math.max(0, ...state.tasks.map((task) => task.order || 0)) + 1;
    }

    function enumerateMonths(start, end) {
      const months = [];
      const cursor = new Date(`${start}T00:00:00`);
      cursor.setDate(1);
      const last = new Date(`${end}T00:00:00`);
      last.setDate(1);
      while (cursor <= last) {
        months.push(new Date(cursor));
        cursor.setMonth(cursor.getMonth() + 1);
      }
      return months;
    }

    function enumerateDates(start, end) {
      const dates = [];
      let cursor = new Date(`${start}T00:00:00`);
      const last = new Date(`${end}T00:00:00`);
      while (cursor <= last) {
        dates.push(formatDate(cursor));
        cursor.setDate(cursor.getDate() + 1);
      }
      return dates;
    }

    function loadData() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (Array.isArray(saved)) return migrateArrayData(saved);

        const data = saved || {};
        const projects = (Array.isArray(data.projects) ? data.projects : [])
          .map(normalizeProject)
          .filter(Boolean);
        const tasks = (Array.isArray(data.tasks) ? data.tasks : []).map((task, index) => normalizeTask({
          ...task,
          projectId: task.projectId || migrateProject(projects, task.project, task.projectDdl),
          order: task.order || index + 1
        }));

        return {
          tasks,
          projects,
          lastReviewDate: data.lastReviewDate || ""
        };
      } catch {
        return {
          tasks: [],
          projects: [],
          lastReviewDate: ""
        };
      }
    }

    function migrateArrayData(oldTasks) {
      const projects = [];
      const tasks = oldTasks.map((task, index) => normalizeTask({
        ...task,
        projectId: migrateProject(projects, task.project, task.projectDdl),
        order: task.order || index + 1
      }));
      return {
        tasks,
        projects,
        lastReviewDate: ""
      };
    }

    function migrateProject(projects, projectName, projectDdl) {
      const name = projectName || projectName === "" ? String(projectName).trim() : "";
      const safeName = name && name !== "未分类" ? name : UNASSIGNED_PROJECT;
      if (safeName === UNASSIGNED_PROJECT) return "";

      let project = projects.find((item) => item.name === safeName);
      if (!project) {
        project = {
          id: crypto.randomUUID ? crypto.randomUUID() : `project-${Date.now()}-${projects.length}`,
          name: safeName,
          ddl: projectDdl || "",
          scheduleMode: projectDdl ? "dated" : "plannedLater",
          createdAt: new Date().toISOString()
        };
        projects.push(project);
      }
      if (projectDdl && !project.ddl) {
        project.ddl = projectDdl;
        project.scheduleMode = "dated";
      }
      return project.id;
    }

    function normalizeTask(task) {
      const done = Boolean(task.done);
      return {
        id: task.id || (crypto.randomUUID ? crypto.randomUUID() : `task-${Date.now()}`),
        text: task.text || "",
        note: task.note || "",
        projectId: task.projectId || "",
        plannedStart: task.plannedStart || "",
        targetDate: task.targetDate || formatDate(new Date()),
        done,
        createdAt: task.createdAt || new Date().toISOString(),
        completedAt: task.completedAt || null,
        completedDate: task.completedDate || (done && task.completedAt ? formatDate(task.completedAt) : ""),
        durationMinutes: Math.max(0, Number.parseInt(task.durationMinutes || "0", 10) || 0),
        completionRating: task.completionRating || "",
        manualOrder: Boolean(task.manualOrder),
        order: task.order || 9999
      };
    }

    function normalizeProject(project) {
      if (!project || !project.name) return null;
      const name = project.name === "未命名项目" ? "未命名" : project.name;
      const ddl = project.ddl || "";
      const scheduleMode = project.scheduleMode || (ddl ? "dated" : (name === "未命名" ? "empty" : "plannedLater"));
      return {
        id: project.id || (crypto.randomUUID ? crypto.randomUUID() : `project-${Date.now()}`),
        name,
        ddl,
        scheduleMode,
        createdAt: project.createdAt || new Date().toISOString()
      };
    }

    function formatPlannedTime(time) {
      if (!time) return "未安排";
      const [hour, minute] = time.split(":");
      return `${hour}:${minute}`;
    }

    function getCompletionRating(value) {
      const ratings = {
        baseline: { label: "保底", emoji: "🌱" },
        partial: { label: "部分", emoji: "◐" },
        full: { label: "全部", emoji: "🏁" }
      };
      return ratings[value] || null;
    }

    function sumMinutes(tasks) {
      return tasks.reduce((total, task) => total + (Number(task.durationMinutes) || 0), 0);
    }

    function formatDuration(minutes) {
      const total = Math.max(0, Number(minutes) || 0);
      const hours = Math.floor(total / 60);
      const mins = total % 60;
      if (hours && mins) return `${hours}小时${mins}分钟`;
      if (hours) return `${hours}小时`;
      return `${mins}分钟`;
    }

    function openTimePie() {
      const date = state.viewMode === "date" ? state.selectedDate : formatDate(new Date());
      const tasks = state.tasks.filter((task) => task.targetDate === date && (Number(task.durationMinutes) || 0) > 0);
      const groups = groupTasksByProject(tasks);
      const total = sumMinutes(tasks);
      els.timePieTitle.textContent = `${friendlyDate(date)} 时间分布 · ${formatDuration(total)}`;

      els.pieTotal.textContent = formatDuration(total);
      if (!total) {
        els.pieChart.style.setProperty("--pie", "#f2eadb");
        els.pieLegend.innerHTML = `<div class="empty">当天还没有记录专注时间。</div>`;
        els.timePieDialog.showModal();
        return;
      }

      const colors = ["#b6402a", "#d48737", "#9f6718", "#2f7f78", "#4f8a69", "#8a684f"];
      let cursor = 0;
      const slices = groups.map((group, index) => {
        const minutes = sumMinutes(group.tasks);
        const start = cursor;
        const end = cursor + (minutes / total) * 100;
        cursor = end;
        return `${colors[index % colors.length]} ${start}% ${end}%`;
      });
      els.pieChart.style.setProperty("--pie", `conic-gradient(${slices.join(", ")})`);
      els.pieLegend.innerHTML = groups.map((group, index) => {
        const minutes = sumMinutes(group.tasks);
        const percent = Math.round((minutes / total) * 100);
        return `
          <div class="legend-item">
            <span class="legend-color" style="background:${colors[index % colors.length]}"></span>
            <span>${escapeHtml(group.project.name)}</span>
            <strong>${formatDuration(minutes)} · ${percent}%</strong>
          </div>
        `;
      }).join("");
      els.timePieDialog.showModal();
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        tasks: state.tasks,
        projects: state.projects,
        lastReviewDate: state.lastReviewDate || ""
      }));
    }

    function formatDate(date) {
      const value = date instanceof Date ? date : new Date(date);
      const year = value.getFullYear();
      const month = String(value.getMonth() + 1).padStart(2, "0");
      const day = String(value.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function addDays(dateString, days) {
      const date = new Date(`${dateString}T00:00:00`);
      date.setDate(date.getDate() + days);
      return formatDate(date);
    }

    function friendlyDate(dateString) {
      const date = new Date(`${dateString}T00:00:00`);
      return date.toLocaleDateString("zh-CN", {
        month: "long",
        day: "numeric",
        weekday: "short"
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
