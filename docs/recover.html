<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>每日任务表 - 数据检查</title>
  <style>
    :root { color-scheme: light; --bg:#efd9b1; --panel:#fffaf1; --text:#332115; --muted:#80634c; --line:#dfc18b; --accent:#b94f32; --teal:#287f74; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; padding:24px; background:linear-gradient(180deg,#fff5df,var(--bg)); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
    main { width:min(900px,100%); margin:0 auto; display:grid; gap:14px; }
    section { padding:18px; border:1px solid var(--line); border-radius:12px; background:var(--panel); box-shadow:0 14px 32px rgba(80,49,20,.11); }
    h1 { margin:0; font-size:26px; }
    h2 { margin:0 0 10px; font-size:18px; }
    p { margin:0; color:var(--muted); line-height:1.5; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; }
    .card { padding:14px; border:1px solid rgba(223,193,139,.82); border-radius:10px; background:#fffdf7; }
    .card span { display:block; color:var(--muted); font-size:13px; font-weight:720; }
    .card strong { display:block; margin-top:8px; font-size:30px; line-height:1; }
    button, a.button { min-height:42px; padding:0 14px; border:0; border-radius:8px; color:#fffaf0; background:var(--accent); font:inherit; font-weight:760; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
    button.secondary, a.secondary { color:var(--accent); background:#f6ddc7; }
    .actions { display:flex; flex-wrap:wrap; gap:8px; }
    pre { max-height:280px; overflow:auto; padding:12px; border:1px solid var(--line); border-radius:8px; background:#fffdf7; white-space:pre-wrap; word-break:break-word; }
    .ok { color:var(--teal); font-weight:760; }
    .bad { color:var(--accent); font-weight:760; }
  </style>
</head>
<body>
<main>
  <section>
    <h1>数据检查</h1>
    <p>这个页面只读取当前浏览器里的每日任务表数据。先看结果，不会自动修改。</p>
  </section>
  <section>
    <h2>当前状态</h2>
    <div class="grid" id="summary"></div>
  </section>
  <section>
    <h2>可执行操作</h2>
    <div class="actions">
      <button id="restoreBackup" class="secondary" type="button">用备份恢复主数据</button>
      <button id="copyReport" type="button">复制诊断信息</button>
      <a class="button secondary" href="./">返回任务表</a>
    </div>
    <p id="message" style="margin-top:10px"></p>
  </section>
  <section>
    <h2>诊断信息</h2>
    <pre id="report"></pre>
  </section>
</main>
<script>
  const MAIN = 'daily-todo-table-v1';
  const BACKUP = 'daily-todo-table-v1-backup';
  const summary = document.querySelector('#summary');
  const report = document.querySelector('#report');
  const message = document.querySelector('#message');
  const restoreBtn = document.querySelector('#restoreBackup');

  function parse(raw) {
    if (!raw) return { ok:false, empty:true, tasks:0, projects:0, error:'没有数据' };
    try {
      const data = JSON.parse(raw);
      if (Array.isArray(data)) return { ok:true, array:true, tasks:data.length, projects:0, data };
      return { ok:true, tasks:Array.isArray(data.tasks) ? data.tasks.length : 0, projects:Array.isArray(data.projects) ? data.projects.length : 0, data };
    } catch (error) {
      return { ok:false, error:String(error) };
    }
  }

  function inspect() {
    const mainRaw = localStorage.getItem(MAIN);
    const backupRaw = localStorage.getItem(BACKUP);
    const keys = Object.keys(localStorage).filter((key) => key.includes('todo') || key.includes('daily'));
    const main = parse(mainRaw);
    const backup = parse(backupRaw);
    const items = [
      ['主数据 Todo', main.tasks || 0],
      ['主数据项目', main.projects || 0],
      ['备份 Todo', backup.tasks || 0],
      ['备份项目', backup.projects || 0],
    ];
    summary.innerHTML = items.map(([label, value]) => `<div class="card"><span>${label}</span><strong>${value}</strong></div>`).join('');
    restoreBtn.disabled = !(backup.ok && ((backup.tasks || 0) || (backup.projects || 0)));
    const payload = {
      main: { ok: main.ok, tasks: main.tasks || 0, projects: main.projects || 0, bytes: mainRaw ? mainRaw.length : 0, error: main.error || '' },
      backup: { ok: backup.ok, tasks: backup.tasks || 0, projects: backup.projects || 0, bytes: backupRaw ? backupRaw.length : 0, error: backup.error || '' },
      keys,
      mainPreview: mainRaw ? mainRaw.slice(0, 900) : '',
      backupPreview: backupRaw ? backupRaw.slice(0, 900) : ''
    };
    report.textContent = JSON.stringify(payload, null, 2);
    if ((main.tasks || 0) || (main.projects || 0)) message.innerHTML = '<span class="ok">主数据还在。</span>返回任务表后如果仍为空，说明主页面读取逻辑还有问题。';
    else if ((backup.tasks || 0) || (backup.projects || 0)) message.innerHTML = '<span class="ok">发现备份。</span>可以点击“用备份恢复主数据”。';
    else message.innerHTML = '<span class="bad">当前域名下没有找到 todo 或项目数据。</span>这通常说明数据已经被空状态覆盖，或之前数据在另一个地址/浏览器里。';
  }

  restoreBtn.addEventListener('click', () => {
    const backupRaw = localStorage.getItem(BACKUP);
    const backup = parse(backupRaw);
    if (!backup.ok || !((backup.tasks || 0) || (backup.projects || 0))) {
      message.textContent = '没有可用备份。';
      return;
    }
    localStorage.setItem(MAIN, backupRaw);
    message.innerHTML = '<span class="ok">已恢复。</span>现在可以返回任务表刷新查看。';
    inspect();
  });

  document.querySelector('#copyReport').addEventListener('click', async () => {
    await navigator.clipboard.writeText(report.textContent);
    message.textContent = '诊断信息已复制。';
  });

  inspect();
</script>
</body>
</html>
